name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & bundle
        run: ./Scripts/bundle.sh

      - name: Zip app
        run: |
          cd dist
          ditto -c -k --keepParent MonitorGlue.app MonitorGlue.zip

      - name: Create release & upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MonitorGlue.zip
          generate_release_notes: true
